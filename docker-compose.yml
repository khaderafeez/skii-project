version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    # Bypass Docker network isolation for direct Bluetooth adapter access
    network_mode: "host"
    # Elevate privileges to permit hardware-level BLE scanning
    privileged: true
    volumes:
      # Mount host DBus socket to enable BlueZ communication
      - /var/run/dbus:/var/run/dbus
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped
    # Ensure telemetry server initializes prior to UI routing
    depends_on:
      - backend